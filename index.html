<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hasnat Ahmed</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --fire: #ff4500;
      --gold: #ffd700;
      --orange: #ff8c00;
      --red: #cc1100;
      --dark: #0a0a0a;
      --smoke: #1a1a1a;
      --chrome: #c0c0c0;
      --white: #f5f0e8;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      background: var(--dark);
      font-family: 'Rajdhani', sans-serif;
      color: var(--white);
    }

    /* ── SCENE ── */
    .scene {
      position: relative;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── ROAD ── */
    .road {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 38%;
      background: linear-gradient(180deg, #111 0%, #1c1c1c 60%, #0a0a0a 100%);
      z-index: 1;
    }
    .road::before {
      content:'';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--orange), var(--gold), var(--orange), transparent);
      box-shadow: 0 0 20px var(--orange), 0 0 50px var(--fire);
    }
    .road-lines {
      position: absolute;
      top: 50%; left: 50%;
      transform: translateX(-50%);
      width: 100%;
      display: flex;
      gap: 3vw;
      justify-content: center;
    }
    .road-line {
      width: 6vw; max-width: 80px; min-width: 30px;
      height: 6px;
      background: var(--gold);
      opacity: 0.25;
      border-radius: 3px;
      animation: rushLines 1.2s linear infinite;
    }
    .road-line:nth-child(2) { animation-delay: -.4s; }
    .road-line:nth-child(3) { animation-delay: -.8s; }
    .road-line:nth-child(4) { animation-delay: -1.1s; }
    .road-line:nth-child(5) { animation-delay: -.2s; }
    @keyframes rushLines {
      0%   { transform: translateX(0); opacity: .25; }
      100% { transform: translateX(-15vw); opacity: 0; }
    }

    /* ── SKY GRADIENT ── */
    .sky {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, #1a0800 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 30% 100%, #ff450020 0%, transparent 60%),
        linear-gradient(180deg, #060303 0%, #0f0300 35%, #1a0800 62%, #111 100%);
      z-index: 0;
    }

    /* ── STARS ── */
    .stars {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity:.15; transform: scale(1); }
      50%      { opacity:.8;  transform: scale(1.4); }
    }

    /* ── GLOW ORBS ── */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      animation: pulse 6s ease-in-out infinite;
    }
    .orb-1 {
      width: clamp(200px,40vw,500px);
      height: clamp(200px,40vw,500px);
      background: radial-gradient(circle, #ff450044 0%, transparent 70%);
      top: -10%; left: -10%;
      animation-delay: 0s;
    }
    .orb-2 {
      width: clamp(150px,30vw,400px);
      height: clamp(150px,30vw,400px);
      background: radial-gradient(circle, #ffd70022 0%, transparent 70%);
      top: 10%; right: -5%;
      animation-delay: -3s;
    }
    .orb-3 {
      width: clamp(100px,20vw,300px);
      height: clamp(100px,20vw,300px);
      background: radial-gradient(circle, #ff8c0033 0%, transparent 70%);
      bottom: 20%; left: 20%;
      animation-delay: -1.5s;
    }
    @keyframes pulse {
      0%,100% { opacity:.6; transform: scale(1); }
      50%      { opacity:1;  transform: scale(1.1); }
    }

    /* ── 1969 FORD MUSTANG SVG ── */
    .car-wrap {
      position: absolute;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(280px, 70vw, 820px);
      z-index: 3;
      filter:
        drop-shadow(0 0 18px #ff4500cc)
        drop-shadow(0 0 50px #ff450066)
        drop-shadow(0 0 100px #ff450033);
      animation: carFloat 4s ease-in-out infinite;
    }
    @keyframes carFloat {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-6px); }
    }

    .car-wrap svg { width: 100%; height: auto; display: block; }

    /* ── SPEED LINES ── */
    .speed-lines {
      position: absolute;
      bottom: 25%;
      left: 0; right: 0;
      height: 60px;
      z-index: 2;
      overflow: hidden;
      pointer-events: none;
    }
    .speed-line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--fire), transparent);
      opacity: 0;
      animation: speedLine 1.5s ease-out infinite;
    }
    @keyframes speedLine {
      0%   { width: 0;   left: 110%; opacity: .6; }
      100% { width: 35%; left: -40%; opacity: 0; }
    }

    /* ── CARD ── */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: clamp(24px, 5vw, 60px) clamp(20px, 6vw, 80px);
      margin-bottom: clamp(180px, 30vw, 340px);
      background:
        linear-gradient(135deg, rgba(255,69,0,.07) 0%, rgba(0,0,0,.55) 50%, rgba(255,140,0,.05) 100%);
      border: 1px solid rgba(255,140,0,.25);
      border-radius: 4px;
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 0 1px rgba(255,215,0,.08),
        0 0 40px rgba(255,69,0,.15),
        inset 0 1px 0 rgba(255,255,255,.06);
      animation: cardIn 1.2s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(30px) scale(.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--gold);
      border-style: solid;
    }
    .card::before { top:-1px; left:-1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }

    /* ── BADGE ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,69,0,.15);
      border: 1px solid rgba(255,69,0,.4);
      border-radius: 2px;
      padding: 4px 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(9px, 1.5vw, 11px);
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: clamp(12px, 2vw, 20px);
      animation: cardIn 1.2s .2s cubic-bezier(.16,1,.3,1) both;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--fire);
      box-shadow: 0 0 8px var(--fire);
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

    /* ── NAME ── */
    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 10vw, 110px);
      line-height: .92;
      letter-spacing: .06em;
      background: linear-gradient(135deg, var(--white) 0%, var(--gold) 40%, var(--orange) 70%, var(--red) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(255,140,0,.5));
      animation: cardIn 1.2s .3s cubic-bezier(.16,1,.3,1) both;
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: clamp(12px,2vw,20px) auto;
      width: 100%;
      animation: cardIn 1.2s .4s cubic-bezier(.16,1,.3,1) both;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
    }
    .divider-icon {
      font-size: clamp(14px, 2.5vw, 20px);
      filter: drop-shadow(0 0 6px var(--gold));
    }

    /* ── INFO ROWS ── */
    .info-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(10px, 2vw, 20px);
      animation: cardIn 1.2s .5s cubic-bezier(.16,1,.3,1) both;
    }
    .info-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,140,0,.15);
      border-radius: 3px;
      padding: clamp(10px,1.5vw,16px) clamp(14px,2.5vw,28px);
      min-width: clamp(110px, 22vw, 180px);
      transition: border-color .3s, background .3s;
    }
    .info-item:hover {
      border-color: rgba(255,140,0,.5);
      background: rgba(255,69,0,.07);
    }
    .info-label {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(8px, 1.2vw, 10px);
      letter-spacing: .2em;
      color: var(--orange);
      text-transform: uppercase;
    }
    .info-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(13px, 2.5vw, 18px);
      font-weight: 700;
      color: var(--white);
      letter-spacing: .04em;
    }

    /* ── TAGLINE ── */
    .tagline {
      margin-top: clamp(14px, 2.5vw, 24px);
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(8px, 1.3vw, 11px);
      letter-spacing: .35em;
      text-transform: uppercase;
      color: rgba(255,215,0,.4);
      animation: cardIn 1.2s .65s cubic-bezier(.16,1,.3,1) both;
    }

    /* ── FIRE PARTICLES ── */
    .particles { position: absolute; inset:0; z-index: 2; pointer-events: none; overflow:hidden; }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: .7; }
      100% { transform: translateY(-100vh) translateX(var(--dx)) scale(0); opacity: 0; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .car-wrap { bottom: 18%; }
      .card { margin-bottom: clamp(140px, 40vw, 200px); }
      .info-grid { gap: 8px; }
      .info-item { min-width: calc(50% - 8px); }
    }
    @media (max-width: 380px) {
      .info-item { min-width: 100%; }
    }
  </style>
</head>
<body>
<div class="scene">

  <!-- Layers -->
  <div class="sky"></div>
  <div class="stars" id="stars"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="particles" id="particles"></div>

  <!-- CARD -->
  <div class="card">
    <div class="badge"><span class="badge-dot"></span>Islamabad, Pakistan</div>
    <div class="name">Hasnat<br>Ahmed</div>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-icon">🔥</span>
      <div class="divider-line"></div>
    </div>
    <div class="info-grid">
      <div class="info-item">
        <span class="info-label">University</span>
        <span class="info-value">AIR University</span>
      </div>
      <div class="info-item">
        <span class="info-label">City</span>
        <span class="info-value">Islamabad</span>
      </div>
      <div class="info-item">
        <span class="info-label">Ride</span>
        <span class="info-value">Ford '69</span>
      </div>
    </div>
    <div class="tagline">Built Different &nbsp;·&nbsp; Drive Legendary</div>
  </div>

  <!-- ROAD -->
  <div class="road">
    <div class="road-lines">
      <div class="road-line"></div>
      <div class="road-line"></div>
      <div class="road-line"></div>
      <div class="road-line"></div>
      <div class="road-line"></div>
    </div>
  </div>

  <!-- 1969 Ford Mustang SVG -->
  <div class="car-wrap">
    <svg viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg" fill="none">
      <!-- Shadow under car -->
      <ellipse cx="410" cy="300" rx="310" ry="18" fill="black" opacity="0.7"/>

      <!-- ── BODY ── -->
      <!-- Main body -->
      <path d="M90 220 Q95 185 130 172 L200 158 L220 130 Q260 88 340 78 L480 74 Q560 74 590 88 L650 110 Q700 126 730 152 L760 172 L770 185 L775 220 Z"
            fill="url(#bodyGrad)" stroke="url(#chromeStroke)" stroke-width="2"/>

      <!-- Roof -->
      <path d="M220 130 Q250 82 340 70 L480 66 Q555 66 585 84 L650 110 L600 108 Q560 96 480 92 L340 96 Q268 102 240 130 Z"
            fill="url(#roofGrad)" stroke="#555" stroke-width="1"/>

      <!-- Windshield -->
      <path d="M245 128 Q268 92 340 80 L480 76 Q540 76 568 92 L598 110 L555 108 Q525 94 480 90 L340 94 Q278 100 258 126 Z"
            fill="url(#glassGrad)" opacity="0.7"/>

      <!-- Rear window -->
      <path d="M600 108 L650 110 L630 126 L605 126 Z"
            fill="url(#glassGrad)" opacity="0.5"/>

      <!-- Hood scoop -->
      <path d="M360 95 L440 92 L445 82 L360 85 Z"
            fill="url(#scoopGrad)" stroke="#333" stroke-width="1"/>
      <path d="M380 90 L420 88 L422 82 L380 84 Z"
            fill="rgba(0,0,0,.6)"/>

      <!-- Front bumper -->
      <path d="M88 222 Q88 240 100 248 L130 252 L128 238 Q110 236 100 228 Z"
            fill="url(#chromeGrad)" stroke="#888" stroke-width="1"/>

      <!-- Rear bumper -->
      <path d="M732 222 Q732 240 720 248 L690 252 L692 238 Q710 236 720 228 Z"
            fill="url(#chromeGrad)" stroke="#888" stroke-width="1"/>

      <!-- Front grille area -->
      <rect x="90" y="200" width="60" height="30" rx="4" fill="#111" stroke="url(#chromeGrad)" stroke-width="1.5"/>
      <!-- Grille slats -->
      <line x1="95" y1="207" x2="145" y2="207" stroke="#333" stroke-width="1.2"/>
      <line x1="95" y1="213" x2="145" y2="213" stroke="#333" stroke-width="1.2"/>
      <line x1="95" y1="219" x2="145" y2="219" stroke="#333" stroke-width="1.2"/>
      <line x1="95" y1="225" x2="145" y2="225" stroke="#333" stroke-width="1.2"/>

      <!-- Headlights -->
      <ellipse cx="108" cy="200" rx="16" ry="14" fill="url(#headlightGrad)" stroke="#999" stroke-width="1.5"/>
      <ellipse cx="108" cy="200" rx="11" ry="9" fill="url(#headlightInner)"/>
      <ellipse cx="108" cy="200" rx="5" ry="4" fill="white" opacity=".9"/>
      <!-- Headlight beam -->
      <path d="M88 196 L20 178 L22 195 L88 205 Z" fill="url(#beamGrad)" opacity=".35"/>
      <path d="M88 200 L10 210 L14 222 L88 212 Z" fill="url(#beamGrad)" opacity=".25"/>

      <!-- Tail lights -->
      <rect x="700" y="188" width="35" height="24" rx="3" fill="#8b0000" stroke="#444" stroke-width="1"/>
      <rect x="703" y="191" width="29" height="8" rx="2" fill="url(#taillightGrad)"/>
      <rect x="703" y="201" width="29" height="8" rx="2" fill="url(#taillightGrad2)"/>

      <!-- Side stripe -->
      <path d="M150 210 Q200 205 340 200 L480 200 Q600 202 680 208 L680 215 Q600 212 480 208 L340 208 Q200 212 150 218 Z"
            fill="url(#stripeGrad)" opacity=".6"/>

      <!-- Door lines -->
      <line x1="290" y1="145" x2="285" y2="235" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>
      <line x1="440" y1="140" x2="445" y2="232" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>
      <line x1="540" y1="142" x2="548" y2="228" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>

      <!-- Door handles -->
      <rect x="340" y="192" width="22" height="5" rx="2" fill="url(#chromeGrad)" stroke="#666" stroke-width=".8"/>
      <rect x="490" y="190" width="22" height="5" rx="2" fill="url(#chromeGrad)" stroke="#666" stroke-width=".8"/>

      <!-- Mirror (driver) -->
      <path d="M248 155 L268 148 L272 158 L252 164 Z" fill="#333" stroke="#555" stroke-width="1"/>

      <!-- Exhaust pipes -->
      <ellipse cx="715" cy="248" rx="8" ry="5" fill="#222" stroke="#666" stroke-width="1.2"/>
      <ellipse cx="715" cy="248" rx="5" ry="3" fill="#111"/>
      <ellipse cx="730" cy="250" rx="8" ry="5" fill="#222" stroke="#666" stroke-width="1.2"/>
      <ellipse cx="730" cy="250" rx="5" ry="3" fill="#111"/>
      <!-- Exhaust smoke -->
      <ellipse cx="720" cy="242" rx="6" ry="4" fill="rgba(180,180,180,.15)" class="smoke1"/>
      <ellipse cx="725" cy="234" rx="9" ry="6" fill="rgba(150,150,150,.1)"/>

      <!-- ── WHEELS ── -->
      <!-- Front wheel assembly -->
      <circle cx="210" cy="268" r="50" fill="url(#tireGrad)" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="210" cy="268" r="38" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
      <circle cx="210" cy="268" r="30" fill="url(#rimGrad)" stroke="url(#chromeStroke)" stroke-width="2"/>
      <!-- Spokes front -->
      <g transform="translate(210,268)" stroke="url(#spokeGrad)" stroke-width="3.5" stroke-linecap="round">
        <line x1="0" y1="-28" x2="0" y2="28"/>
        <line x1="-28" y1="0" x2="28" y2="0"/>
        <line x1="-20" y1="-20" x2="20" y2="20"/>
        <line x1="20" y1="-20" x2="-20" y2="20"/>
      </g>
      <circle cx="210" cy="268" r="8" fill="url(#hubGrad)" stroke="#999" stroke-width="2"/>
      <circle cx="210" cy="268" r="4" fill="url(#chromeGrad)"/>

      <!-- Rear wheel assembly -->
      <circle cx="600" cy="268" r="50" fill="url(#tireGrad)" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="600" cy="268" r="38" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
      <circle cx="600" cy="268" r="30" fill="url(#rimGrad)" stroke="url(#chromeStroke)" stroke-width="2"/>
      <!-- Spokes rear -->
      <g transform="translate(600,268)" stroke="url(#spokeGrad)" stroke-width="3.5" stroke-linecap="round">
        <line x1="0" y1="-28" x2="0" y2="28"/>
        <line x1="-28" y1="0" x2="28" y2="0"/>
        <line x1="-20" y1="-20" x2="20" y2="20"/>
        <line x1="20" y1="-20" x2="-20" y2="20"/>
      </g>
      <circle cx="600" cy="268" r="8" fill="url(#hubGrad)" stroke="#999" stroke-width="2"/>
      <circle cx="600" cy="268" r="4" fill="url(#chromeGrad)"/>

      <!-- Wheel wells -->
      <path d="M155 258 Q160 232 210 228 Q260 232 265 258 Z" fill="rgba(0,0,0,.8)" stroke="#222" stroke-width="1"/>
      <path d="M545 258 Q550 232 600 228 Q650 232 655 258 Z" fill="rgba(0,0,0,.8)" stroke="#222" stroke-width="1"/>

      <!-- Underbody -->
      <path d="M160 252 L280 244 L345 248 L455 248 L545 246 L650 252 L640 266 L160 266 Z"
            fill="url(#underbodyGrad)" stroke="#222" stroke-width="1"/>

      <!-- Chrome side trim -->
      <path d="M150 230 Q400 225 660 228" stroke="url(#chromeStroke)" stroke-width="2" opacity=".5"/>

      <!-- ── GRADIENTS & DEFS ── -->
      <defs>
        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#cc1100"/>
          <stop offset="35%" stop-color="#a80f00"/>
          <stop offset="70%" stop-color="#7a0900"/>
          <stop offset="100%" stop-color="#3d0500"/>
        </linearGradient>
        <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#880a00"/>
          <stop offset="100%" stop-color="#550600"/>
        </linearGradient>
        <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#1a4a6e" stop-opacity=".8"/>
          <stop offset="50%" stop-color="#0d2640" stop-opacity=".6"/>
          <stop offset="100%" stop-color="#0a1a2e" stop-opacity=".9"/>
        </linearGradient>
        <linearGradient id="scoopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#888"/>
          <stop offset="100%" stop-color="#333"/>
        </linearGradient>
        <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#e0e0e0"/>
          <stop offset="40%" stop-color="#999"/>
          <stop offset="100%" stop-color="#555"/>
        </linearGradient>
        <linearGradient id="chromeStroke" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#666"/>
          <stop offset="50%" stop-color="#ccc"/>
          <stop offset="100%" stop-color="#666"/>
        </linearGradient>
        <radialGradient id="headlightGrad" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#fffbe0"/>
          <stop offset="60%" stop-color="#ffe090"/>
          <stop offset="100%" stop-color="#888"/>
        </radialGradient>
        <radialGradient id="headlightInner" cx="40%" cy="35%">
          <stop offset="0%" stop-color="white"/>
          <stop offset="100%" stop-color="#ffe080"/>
        </radialGradient>
        <linearGradient id="beamGrad" x1="100%" y1="0%" x2="0%" y2="0%">
          <stop offset="0%" stop-color="#ffe080"/>
          <stop offset="100%" stop-color="#ffe080" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="taillightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ff2200"/>
          <stop offset="100%" stop-color="#ff6600"/>
        </linearGradient>
        <linearGradient id="taillightGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#cc0000"/>
          <stop offset="100%" stop-color="#ee3300"/>
        </linearGradient>
        <linearGradient id="stripeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="transparent"/>
          <stop offset="20%" stop-color="#ff6600"/>
          <stop offset="80%" stop-color="#ff4400"/>
          <stop offset="100%" stop-color="transparent"/>
        </linearGradient>
        <radialGradient id="tireGrad" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#3a3a3a"/>
          <stop offset="100%" stop-color="#0a0a0a"/>
        </radialGradient>
        <radialGradient id="rimGrad" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#d0d0d0"/>
          <stop offset="40%" stop-color="#888"/>
          <stop offset="100%" stop-color="#444"/>
        </radialGradient>
        <linearGradient id="spokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ccc"/>
          <stop offset="50%" stop-color="#888"/>
          <stop offset="100%" stop-color="#ccc"/>
        </linearGradient>
        <radialGradient id="hubGrad" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#eee"/>
          <stop offset="100%" stop-color="#666"/>
        </radialGradient>
        <linearGradient id="underbodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#222"/>
          <stop offset="100%" stop-color="#111"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <!-- Speed lines -->
  <div class="speed-lines" id="speedLines"></div>

</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s = document.createElement('div');
    s.className='star';
    const sz = Math.random()*2+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*65}%;left:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s`;
    starsEl.appendChild(s);
  }

  // Fire particles
  const particlesEl = document.getElementById('particles');
  const colors = ['#ff4500','#ff8c00','#ffd700','#ff2200','#ff6600'];
  for(let i=0;i<40;i++){
    const p = document.createElement('div');
    p.className='particle';
    const sz = Math.random()*6+2;
    const dx = (Math.random()-0.5)*200;
    const dur = 4+Math.random()*6;
    p.style.cssText=`
      width:${sz}px;height:${sz}px;
      left:${10+Math.random()*80}%;
      bottom:${15+Math.random()*25}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      opacity:.6;
      --dx:${dx}px;
      animation-duration:${dur}s;
      animation-delay:${Math.random()*6}s;
      filter:blur(${Math.random()>0.5?1:0}px);
    `;
    particlesEl.appendChild(p);
  }

  // Speed lines
  const sl = document.getElementById('speedLines');
  for(let i=0;i<8;i++){
    const l = document.createElement('div');
    l.className='speed-line';
    l.style.cssText=`top:${Math.random()*100}%;animation-delay:${Math.random()*1.5}s;animation-duration:${1+Math.random()*.8}s;`;
    sl.appendChild(l);
  }
</script>
</body>
</html>
