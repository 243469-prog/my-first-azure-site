<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasnat's Azure Site</title>
    <style>
        body {
            background-color: #0b0e14; /* Deep dark background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .aura-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: white;
            /* The "Aura" Glow */
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2), 0 0 60px rgba(121, 40, 202, 0.2);
            transition: transform 0.3s ease;
        }

        .aura-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.4), 0 0 80px rgba(121, 40, 202, 0.4);
        }

       h1 {
    margin: 0;
    font-size: 2.5rem;
    background: linear-gradient(90deg, #00d4ff, #7928ca);
    background-clip: text; /* Standard property */
    -webkit-background-clip: text; /* Required for Chrome/Edge/Safari */
    -webkit-text-fill-color: transparent;
    color: transparent; /* Fallback */
}

        p {
            color: #ccc;
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .label {
            font-weight: bold;
            color: #00d4ff;
        }
    </style>
</head>
<body>

    <div class="aura-card">
        <h1>Hasnat Ahmed</h1>
        <p><span class="label">City:</span> Islamabad</p>
        <p><span class="label">University:</span> Air University</p>
        <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 20px 0;">
        <p style="font-size: 0.8rem; opacity: 0.6;">Deployed via Azure Static Web Apps</p>
    </div>

</body>
</html>
